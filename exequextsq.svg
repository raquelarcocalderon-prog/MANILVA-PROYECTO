<div class="exe-text-template">
    <p>Para evaluar el aprendizaje del alumnado se utilizarán los siguientes instrumentos: lista de cotejo y diana de autoevaluación.</p>
<p> Con la lista de cotejo se observará:</p>
<p>-Participación<br />-Trabajo en grupo<br />-Uso de herramientas digitales<br />-Comprensión de contenidos</p>
<p><br />Con la Diana de autoevaluación el alumnado reflexionará sobre:</p>
<p>-Su esfuerzo<br />-Su participación<br />-Su aprendizaje</p>
<p><a href="https://drive.google.com/file/d/1M_lC1DV7UAPPrMqTYcuhoTql5u8vmY_N/view?usp=sharing" title="">Evaluación</a></p>
